name: CI/CD Checks

on:
  pull_request:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test (Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Bytecode compile check
        run: |
          python -m compileall -q src dashboards tests

      - name: Data quality gates (if artifacts available)
        run: |
          if [ -f data/processed/interactions.parquet ] || [ -f data/processed/interactions_collapsed_c_p_d_s.parquet ]; then
            python -m src.cli.data_quality_gates --stage ci --strict
          else
            echo "Skipping data quality gates: no processed artifacts in CI workspace."
          fi

      - name: Unit tests
        run: pytest -q

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: docker build -t fairaffinity:ci .

      - name: Validate compose file
        run: docker compose config
