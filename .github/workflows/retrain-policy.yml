name: Retrain Policy

on:
  schedule:
    - cron: "0 5 * * 1" # Every Monday at 05:00 UTC
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  policy-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build monitoring snapshot (if possible)
        run: |
          python -m src.cli.monitoring_snapshot || true

      - name: Retrain policy decision
        run: |
          python -m src.cli.retrain_policy

      - name: Upload policy artifact
        uses: actions/upload-artifact@v4
        with:
          name: retrain-policy-decision
          path: data/processed/model_registry/retrain_policy_decision.json
